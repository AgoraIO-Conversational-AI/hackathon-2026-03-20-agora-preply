services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: loop_dev
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 100mb --maxmemory-policy allkeys-lru
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 30

  temporal:
    image: temporalio/auto-setup:1.24.2
    ports:
      - "7235:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=dev
      - POSTGRES_PWD=pass
      - POSTGRES_SEEDS=db
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development.yaml
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./docker/temporal/dynamicconfig:/etc/temporal/config/dynamicconfig

  temporal-ui:
    image: temporalio/ui:2.31.2
    ports:
      - "8089:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3006
    depends_on:
      - temporal

volumes:
  postgres_data:
