# Default mode: Temporal + Redis via Docker
procs:
  docker:
    shell: "trap 'docker compose stop redis temporal temporal-ui' EXIT; docker compose up redis temporal temporal-ui"

  backend:
    shell: "cd backend && uv run python manage.py runserver 0.0.0.0:${BACKEND_PORT:-8006}"
    env:
      PYTHONUNBUFFERED: "1"

  temporal-worker:
    shell: |
      echo "Waiting for Temporal on port ${TEMPORAL_PORT:-7235}..."
      while ! nc -z localhost ${TEMPORAL_PORT:-7235} 2>/dev/null; do sleep 1; done
      echo "Temporal ready, starting worker..."
      cd backend && uv run python manage.py run_temporal_worker
    env:
      PYTHONUNBUFFERED: "1"

  frontend:
    shell: "cd frontend && FRONTEND_PORT=${FRONTEND_PORT:-3006} bun run dev"
